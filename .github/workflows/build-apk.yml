name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Print debug signing certificate SHA-1 (needed for Google OAuth setup)
        run: |
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          # Extract the cert from the APK and print SHA-1
          unzip -p $APK META-INF/*.RSA META-INF/*.DSA META-INF/*.EC 2>/dev/null | \
            keytool -printcert | grep -E 'SHA1|SHA-1' || true
          # Also try the standard debug keystore locations
          for KS in ~/.android/debug.keystore $ANDROID_SDK_ROOT/debug.keystore $HOME/.gradle/debug.keystore; do
            if [ -f "$KS" ]; then
              echo "Found keystore at $KS"
              keytool -list -v -keystore $KS -alias androiddebugkey -storepass android -keypass android | grep -E 'SHA1|SHA-1'
            fi
          done
          # Fallback: find any debug.keystore on the runner
          find / -name "debug.keystore" 2>/dev/null | head -5 | while read KS; do
            echo "Found: $KS"
            keytool -list -v -keystore $KS -alias androiddebugkey -storepass android -keypass android 2>/dev/null | grep -E 'SHA1|SHA-1' || true
          done

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: health-connect-exporter-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
