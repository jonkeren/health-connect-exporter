name: Build APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Decode release keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > android/app/release.keystore

      - name: Build release APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/app/release.keystore \
            -Pandroid.injected.signing.store.password=${{ secrets.RELEASE_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.RELEASE_KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Print release signing certificate SHA-256
        run: |
          keytool -list -v \
            -keystore android/app/release.keystore \
            -alias ${{ secrets.RELEASE_KEY_ALIAS }} \
            -storepass ${{ secrets.RELEASE_STORE_PASSWORD }} \
            | grep -E "SHA1|SHA256"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: health-connect-exporter-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
